spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health, info


services:
  campaigns:
    host: ${CAMPAIGNS_IP_ADDRESS:http://localhost}
    port: ${ACCOUNTS_PORT:8082}
  accounts:
    host: ${ACCOUNTS_IP_ADDRESS:http://localhost}
    port: ${ACCOUNTS_PORT:8083}
  order-hub:
    host: ${ORDER_HUB_IP_ADDRESS:http://localhost}
    port: ${ORDER_HUB_PORT:8084}
  media-manager:
    host: ${MEDIA_MANAGER_IP_ADDRESS:http://localhost}
    port: ${MEDIA_MANAGER_PORT:8085}
