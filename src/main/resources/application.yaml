spring:

  application:
    name: catalog

  jackson:
    time-zone: Asia/Gaza

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        envers:
          revision_type_field_name: revtype
          revision_field_name: rev
          track_entities_changed_in_revision: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:emall}
    password: ${SPRING_RABBITMQ_PASSWORD:emallpass}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        concurrency: 1
        max-concurrency: 4
        prefetch: 20


management:
  endpoints:
    web:
      exposure:
        include: health, info

moderation:
  openai:
    api-key: ${OPENAI_MODERATION_API_KEY}
    rate-limit-retries: 2
    rate-limit-retry-delay-ms: 3000

  worker:
    transaction-commit-delay-ms: 300
    delay-between-calls-ms: 1200

  scheduler:
    max-retries: 3              # AI called at most 3 times per comment on failure
    retry-interval-minutes: 10  # Wait 10 min between retries
    retry-interval-ms: 600000   # Same value in milliseconds for @Scheduled

app:
  jwt:
    secret: ${JWT_SECRET}

services:
  campaigns:
    host: ${CAMPAIGNS_IP_ADDRESS:http://localhost}
    port: ${ACCOUNTS_PORT:8082}
    username: ${ACCOUNTS_USER_NAME:e-mall}
    password: ${ACCOUNTS_PASSWORD:e-mall}
  accounts:
    host: ${ACCOUNTS_IP_ADDRESS:http://localhost}
    port: ${ACCOUNTS_PORT:8083}
    username: ${ACCOUNTS_USER_NAME:e-mall}
    password: ${ACCOUNTS_PASSWORD:e-mall}
  order-hub:
    host: ${ORDER_HUB_IP_ADDRESS:http://localhost}
    port: ${ORDER_HUB_PORT:8084}
    username: ${ORDER_HUB_USER_NAME:e-mall}
    password: ${ORDER_HUB_PASSWORD:e-mall}
  media-manager:
    host: ${MEDIA_MANAGER_IP_ADDRESS:http://localhost}
    port: ${MEDIA_MANAGER_PORT:8085}
    username: ${MEDIA_MANAGER_USER_NAME:e-mall}
    password: ${MEDIA_MANAGER_PASSWORD:e-mall}
  interaction:
    host: ${INTERACTION_IP_ADDRESS:http://localhost}
    port: ${INTERACTION_PORT:8086}
    username: ${INTERACTION_USER_NAME:e-mall}
    password: ${INTERACTION_PASSWORD:e-mall}
