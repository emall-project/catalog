spring:
  application:
    name: catalog
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        envers:
          revision_type_field_name: revtype
          revision_field_name: rev
          track_entities_changed_in_revision: false

  jackson:
    time-zone: Asia/Gaza

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

management:
  otlp:
    metrics:
      export:
        url: ${GRAFANA_URL:http://localhost:4318}/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${GRAFANA_URL:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${GRAFANA_URL:http://localhost:4318}/v1/logs
  endpoints:
    web:
      exposure:
        include: health, info


services:
  campaigns:
    host: ${CAMPAIGNS_IP_ADDRESS:http://localhost}
    port: ${ACCOUNTS_PORT:8082}
    username: ${ACCOUNTS_USER_NAME:e-mall}
    password: ${ACCOUNTS_PASSWORD:e-mall}
  accounts:
    host: ${ACCOUNTS_IP_ADDRESS:http://localhost}
    port: ${ACCOUNTS_PORT:8083}
    username: ${ACCOUNTS_USER_NAME:e-mall}
    password: ${ACCOUNTS_PASSWORD:e-mall}
  order-hub:
    host: ${ORDER_HUB_IP_ADDRESS:http://localhost}
    port: ${ORDER_HUB_PORT:8084}
    username: ${ORDER_HUB_USER_NAME:e-mall}
    password: ${ORDER_HUB_PASSWORD:e-mall}
  media-manager:
    host: ${MEDIA_MANAGER_IP_ADDRESS:http://localhost}
    port: ${MEDIA_MANAGER_PORT:8085}
    username: ${MEDIA_MANAGER_USER_NAME:e-mall}
    password: ${MEDIA_MANAGER_PASSWORD:e-mall}

